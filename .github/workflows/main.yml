name: seedly_frontend

on:
  push:
    branches:
      - main

jobs:
  myDeployment:
    runs-on: ubuntu-latest
    steps:
      - name: For pick the repository
        uses: actions/checkout@v4
      - name: for connection
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.SSH_KEY}}

          script: |
            cd /home/ubuntu/seedlyfrntd
            git pull origin main
            npm i
            npm run build
            sudo npm i pm2 -g
            pm2 start npm --name "seedly_frontend" -- run dev
